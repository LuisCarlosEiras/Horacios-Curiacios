<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horácios e Curiácios com Memória</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #eee; }
    .container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
    #tabuleiro { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(8, 1fr); gap: 1px; width: 350px; height: 400px; border: 3px solid #000; }
    .casa { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 24px; }
    .clara { background-color: #f0d9b5; }
    .escura { background-color: #b58863; }
    .botoes { margin: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    button { padding: 10px; font-size: 14px; }
    #mensagemFinal { margin: 10px; font-size: 18px; font-weight: bold; }
    canvas { border: 1px solid #999; margin-top: 20px; }
  </style>
</head>
<body onload="estadoInicial()">
<div class="container">
  <div id="tabuleiro"></div>
  <div class="botoes">
    <button onclick="treinarIA()">Treinar os Curiácios</button>
    <button onclick="zerarTreinamento()">Zerar o Treinamento</button>
    <button onclick="estadoInicial()">Reiniciar o Jogo</button>
  </div>
  <div id="mensagemFinal"></div>
  <canvas id="grafico" width="500" height="200"></canvas>
</div>
<script>
let pecas, donos, selecionado = null, movimentosValidos = [], semCaptura = 0;
let resultados = [], historico = [];
const memoria = {}; // Armazena jogadas boas para cada peca

function salvarResultados() {
  localStorage.setItem('resultados', JSON.stringify(resultados));
  localStorage.setItem('historico', JSON.stringify(historico));
  localStorage.setItem('memoria', JSON.stringify(memoria));
}

function carregarResultados() {
  resultados = JSON.parse(localStorage.getItem('resultados')) || [];
  historico = JSON.parse(localStorage.getItem('historico')) || [];
  const m = JSON.parse(localStorage.getItem('memoria'));
  if (m) Object.assign(memoria, m);
}

function estadoInicial() {
  pecas = {
    'C8': '🏹','D8': '🏹','E8': '🏹','C7': '🗡️','D7': '🗡️','E7': '🗡️','C6': '⚔️','D6': '⚔️','E6': '⚔️',
    'C1': '🏹','D1': '🏹','E1': '🏹','C2': '🗡️','D2': '🗡️','E2': '🗡️','C3': '⚔️','D3': '⚔️','E3': '⚔️'
  };
  donos = {};
  for (const pos in pecas) donos[pos] = parseInt(pos[1]) >= 6 ? 'C' : 'H';
  selecionado = null;
  movimentosValidos = [];
  semCaptura = 0;
  document.getElementById('mensagemFinal').innerText = '';
  atualizarTabuleiro();
  desenharGrafico();
}

function atualizarTabuleiro() {
  const tab = document.getElementById('tabuleiro');
  tab.innerHTML = '';
  for (let r = 8; r >= 1; r--) {
    for (let c = 0; c < 7; c++) {
      const coord = String.fromCharCode(65 + c) + r;
      const div = document.createElement('div');
      div.className = 'casa ' + ((r + c) % 2 === 0 ? 'clara' : 'escura');
      if (pecas[coord]) div.innerHTML = `<span>${pecas[coord]}</span>`;
      div.onclick = () => cliqueCasa(coord);
      tab.appendChild(div);
    }
  }
}

function cliqueCasa(coord) {
  if (selecionado) {
    if (movimentosValidos.includes(coord)) {
      const captura = !!pecas[coord];
      pecas[coord] = pecas[selecionado];
      donos[coord] = donos[selecionado];
      delete pecas[selecionado]; delete donos[selecionado];
      selecionado = null; movimentosValidos = [];
      if (captura) semCaptura = 0; else semCaptura++;
      atualizarTabuleiro();
      verificarFim();
      setTimeout(jogadaCuriacio, 300);
    } else {
      selecionado = null; movimentosValidos = []; atualizarTabuleiro();
    }
  } else if (pecas[coord] && donos[coord] === 'H') {
    selecionado = coord;
    movimentosValidos = gerarMovimentosValidos(coord);
    atualizarTabuleiro();
  }
}

function gerarMovimentosValidos(origem) {
  const tipo = pecas[origem];
  const alcance = tipo === '🏹' ? 3 : tipo === '🗡️' ? 2 : 1;
  const moves = [];
  for (let dx = -alcance; dx <= alcance; dx++) {
    for (let dy = -alcance; dy <= alcance; dy++) {
      if (dx === 0 && dy === 0) continue;
      const c = String.fromCharCode(origem.charCodeAt(0) + dx);
      const r = parseInt(origem[1]) + dy;
      const destino = c + r;
      if (c >= 'A' && c <= 'G' && r >= 1 && r <= 8) {
        if (!pecas[destino] || donos[destino] !== donos[origem]) moves.push(destino);
      }
    }
  }
  return moves;
}

function jogadaCuriacio() {
  let melhor = null;
  let valorMax = -Infinity;
  for (const pos in pecas) {
    if (donos[pos] !== 'C') continue;
    const moves = gerarMovimentosValidos(pos);
    for (const destino of moves) {
      const chave = pos + '-' + destino;
      if (!(chave in memoria)) memoria[chave] = 0;
      const peso = memoria[chave] + (pecas[destino] ? 1 : 0) + Math.random();
      if (peso > valorMax) {
        valorMax = peso;
        melhor = { origem: pos, destino, chave };
      }
    }
  }
  if (melhor) {
    const captura = !!pecas[melhor.destino];
    pecas[melhor.destino] = pecas[melhor.origem];
    donos[melhor.destino] = 'C';
    delete pecas[melhor.origem]; delete donos[melhor.origem];
    if (captura) semCaptura = 0; else semCaptura++;
    historico.push(melhor.chave);
    atualizarTabuleiro(); verificarFim();
  }
}

function jogadaHoracioIA() {
  let melhor = null;
  let valorMax = -Infinity;
  for (const pos in pecas) {
    if (donos[pos] !== 'H') continue;
    const moves = gerarMovimentosValidos(pos);
    for (const destino of moves) {
      const peso = (pecas[destino] ? 1 : 0) + Math.random();
      if (peso > valorMax) melhor = { origem: pos, destino };
    }
  }
  if (melhor) {
    const captura = !!pecas[melhor.destino];
    pecas[melhor.destino] = pecas[melhor.origem];
    donos[melhor.destino] = 'H';
    delete pecas[melhor.origem]; delete donos[melhor.origem];
    if (captura) semCaptura = 0; else semCaptura++;
    atualizarTabuleiro(); verificarFim();
  }
}

function verificarFim() {
  const h = Object.values(donos).filter(v => v === 'H').length;
  const c = Object.values(donos).filter(v => v === 'C').length;
  if (h === 0) return fimDeJogo("C");
  if (c === 0) return fimDeJogo("H");
  if (semCaptura >= 50) return fimDeJogo("P");
}

function fimDeJogo(vencedor) {
  resultados.push(vencedor);
  document.getElementById('mensagemFinal').innerText = vencedor === 'H' ? '🏆 Vitória dos Horácios' : vencedor === 'C' ? '🏆 Vitória dos Curiácios' : '🤝 Paz';
  if (vencedor === 'C') historico.forEach(k => memoria[k] += 1);
  if (vencedor === 'H') historico.forEach(k => memoria[k] -= 1);
  salvarResultados(); historico = [];
  desenharGrafico();
}

function treinarIA() {
  for (let i = 0; i < 10; i++) {
    estadoInicial();
    let p = 0;
    while (!document.getElementById('mensagemFinal').innerText && p++ < 100) {
      jogadaCuriacio();
      if (document.getElementById('mensagemFinal').innerText) break;
      jogadaHoracioIA();
    }
  }
  estadoInicial();
}

function zerarTreinamento() {
  resultados = []; historico = [];
  for (let k in memoria) delete memoria[k];
  salvarResultados();
  estadoInicial();
}

function desenharGrafico() {
  const ctx = document.getElementById('grafico').getContext('2d');
  ctx.clearRect(0, 0, 500, 200);
  const h = resultados.filter(r => r === 'H').length;
  const c = resultados.filter(r => r === 'C').length;
  const p = resultados.filter(r => r === 'P').length;
  const total = resultados.length || 1;

  const data = [h, c, p];
  const cores = ['#0078ff', '#ff3333', '#aaa'];
  const labels = ['Horácios', 'Curiácios', 'Paz'];
  const max = Math.max(...data);

  for (let i = 0; i < 3; i++) {
    const x = 100 + i * 120;
    const altura = (data[i] / total) * 150;
    ctx.fillStyle = cores[i];
    ctx.fillRect(x, 180 - altura, 40, altura);
    ctx.fillStyle = '#000';
    ctx.fillText(`${labels[i]}: ${data[i]}`, x + 20, 195);
  }
}

carregarResultados();
</script>
</body>
</html>
