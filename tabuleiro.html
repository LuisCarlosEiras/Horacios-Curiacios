<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horácios e Curiácios com Memória</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #eee; }
    .container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
    #tabuleiro { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(8, 1fr); gap: 1px; width: 350px; height: 400px; border: 3px solid #000; }
    .casa { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; }
    .clara { background-color: #f0d9b5; }
    .escura { background-color: #b58863; }
    .botoes { margin: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 10px;
      font-size: 14px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    #mensagemFinal { margin: 10px; font-size: 18px; font-weight: bold; }
    canvas { border: 1px solid #999; margin-top: 20px; }
  </style>
</head>
<body onload="iniciarJogo()">
<div class="container">
  <div id="tabuleiro"></div>
  <div class="botoes">
    <button onclick="treinarIA()">Treinar os Curiácios</button>
    <button onclick="zerarTreinamento()">Zerar o Treinamento</button>
    <button onclick="estadoInicial()">Reiniciar o Jogo</button>
  </div>
  <div id="mensagemFinal"></div>
  <canvas id="grafico" width="500" height="200"></canvas>
</div>
<script>
let pecas, donos, selecionado = null, movimentosValidos = [], semCaptura = 0;
let resultados = [], historico = [];
const memoria = {}; // Armazena jogadas boas para cada peca

function salvarResultados() {
  localStorage.setItem('resultados', JSON.stringify(resultados));
  localStorage.setItem('historico', JSON.stringify(historico));
  localStorage.setItem('memoria', JSON.stringify(memoria));
}

function carregarResultados() {
  resultados = JSON.parse(localStorage.getItem('resultados')) || [];
  historico = JSON.parse(localStorage.getItem('historico')) || [];
  const m = JSON.parse(localStorage.getItem('memoria'));
  if (m) Object.assign(memoria, m);
}

function iniciarJogo() {
  carregarResultados();
  estadoInicial();
}

function estadoInicial() {
  pecas = {
    'C8': '🏹','D8': '🏹','E8': '🏹','C7': '🗡️','D7': '🗡️','E7': '🗡️','C6': '⚔️','D6': '⚔️','E6': '⚔️',
    'C1': '🏹','D1': '🏹','E1': '🏹','C2': '🗡️','D2': '🗡️','E2': '🗡️','C3': '⚔️','D3': '⚔️','E3': '⚔️'
  };
  donos = {};
  for (const pos in pecas) donos[pos] = parseInt(pos[1]) >= 6 ? 'C' : 'H';
  selecionado = null;
  movimentosValidos = [];
  semCaptura = 0;
  document.getElementById('mensagemFinal').innerText = '';
  atualizarTabuleiro();
  desenharGrafico();
}

function atualizarTabuleiro() {
  const tab = document.getElementById('tabuleiro');
  tab.innerHTML = '';
  for (let r = 8; r >= 1; r--) {
    for (let c = 0; c < 7; c++) {
      const coord = String.fromCharCode(65 + c) + r;
      const div = document.createElement('div');
      div.className = 'casa ' + ((r + c) % 2 === 0 ? 'clara' : 'escura');
      if (pecas[coord]) {
        const span = document.createElement('span');
        span.textContent = pecas[coord];
        div.appendChild(span);
      }
      div.onclick = () => cliqueCasa(coord);
      tab.appendChild(div);
    }
  }
}

// ... (restante do código permanece inalterado)
</script>
</body>
</html>
